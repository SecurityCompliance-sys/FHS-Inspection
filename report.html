<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายงานประจำสัปดาห์ · FHS · BevChain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@500;600;700&family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root{
  --bg:#E9ECF2;--surface:#FFFFFF;--surface-2:#F4F6FA;--ink:#0F1A2E;--navy:#15234A;--navy-2:#1E2761;
  --red:#D62828;--red-deep:#9B1B1B;--amber:#E65100;--green:#0E8A5F;--line:#D7DDE8;--muted:#64708A;--ice:#CADCFC;
  --shadow:0 1px 2px rgba(15,26,46,.06),0 8px 24px rgba(15,26,46,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:"IBM Plex Sans Thai",sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;font-size:15px}
.mono{font-family:"IBM Plex Mono",monospace;letter-spacing:.02em}
.hazard{height:6px;background:repeating-linear-gradient(135deg,var(--amber) 0 14px,var(--ink) 14px 28px)}
.topbar{background:var(--navy);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:30}
.logo{display:flex;align-items:center;gap:10px}.logo svg{width:30px;height:30px}
.logo b{font-family:"Bai Jamjuree";font-weight:700;font-size:15px;line-height:1.1}
.logo span{display:block;font-size:10.5px;color:var(--ice);font-weight:500;letter-spacing:.04em}
.topbar .right{margin-left:auto;display:flex;align-items:center;gap:14px;font-size:12px;color:var(--ice)}
.topbar .right a{color:#fff;cursor:pointer;font-weight:600}
.appsw{display:flex;gap:3px;background:rgba(255,255,255,.08);padding:3px;border-radius:10px;margin-left:8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.appsw a{padding:6px 12px;border-radius:7px;font-size:13px;font-weight:600;color:var(--ice);text-decoration:none;font-family:"Bai Jamjuree";white-space:nowrap;transition:background .12s}
.appsw a:hover{background:rgba(255,255,255,.12);color:#fff}
.appsw a.cur{background:#fff;color:var(--navy)}
.wrap{max-width:920px;margin:0 auto;padding:22px 18px 60px}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 18px;border:none;border-radius:10px;font:inherit;font-weight:600;font-size:14px;cursor:pointer;font-family:"Bai Jamjuree";transition:filter .15s,transform .08s}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--navy);color:#fff}.btn-primary:hover{filter:brightness(1.13)}
.btn-green{background:var(--green);color:#fff}.btn-ghost{background:var(--surface);color:var(--navy);border:1.5px solid var(--line)}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:9px}
.btn:disabled{opacity:.5;cursor:not-allowed}
input,select{padding:10px 13px;border:1.5px solid var(--line);border-radius:10px;font:inherit;font-size:14px;background:var(--surface);color:var(--ink)}
label{display:block;font-size:13px;font-weight:600;color:var(--navy);margin:0 0 6px}

.toolbar{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:18px;box-shadow:var(--shadow)}
.toolbar .grow{flex:1}

.report{background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
.r-head{background:linear-gradient(135deg,var(--navy),var(--navy-2));color:#fff;padding:22px 24px;position:relative;overflow:hidden}
.r-head::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;background:rgba(202,220,252,.08)}
.r-head .et{font-family:"Bai Jamjuree";font-weight:700;font-size:23px}
.r-head .ep{color:var(--ice);font-size:13px;margin-top:4px}
.r-head .badge-site{display:inline-block;margin-top:10px;background:rgba(255,255,255,.14);padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}

.sec{padding:20px 24px;border-bottom:1px solid var(--line)}
.sec:last-child{border-bottom:none}
.sec h3{font-family:"Bai Jamjuree";font-weight:700;font-size:16px;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;gap:8px}

.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.kpi{border:1px solid var(--line);border-radius:11px;padding:14px;text-align:center;position:relative}
.kpi .v{font-family:"Bai Jamjuree";font-weight:700;font-size:26px;line-height:1}
.kpi .l{font-size:11.5px;color:var(--muted);margin-top:5px;font-weight:600}
.kpi .d{font-size:11px;font-weight:700;margin-top:5px}
.kpi .d.up{color:var(--green)}.kpi .d.down{color:var(--red)}.kpi .d.flat{color:var(--muted)}
.kpi.green .v{color:var(--green)}.kpi.red .v{color:var(--red)}.kpi.amber .v{color:var(--amber)}.kpi.navy .v{color:var(--navy-2)}

table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 11px;background:var(--surface-2);color:var(--navy);font-weight:600;font-size:11.5px;border-bottom:1px solid var(--line)}
td{padding:9px 11px;border-bottom:1px solid var(--line);vertical-align:middle}
.tag{font-weight:600}.tag.fail,.tag.needs_repair{color:var(--red)}.tag.pass{color:var(--green)}
.thumb{width:42px;height:42px;border-radius:7px;object-fit:cover;border:1px solid var(--line);cursor:pointer}
.thumbs{display:flex;gap:4px}
.badge{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:20px;display:inline-block;white-space:nowrap}
.badge.green{background:rgba(14,138,95,.13);color:var(--green)}.badge.red{background:rgba(214,40,40,.1);color:var(--red)}
.badge.amber{background:rgba(230,81,0,.13);color:var(--amber)}.badge.navy{background:rgba(30,39,97,.1);color:var(--navy-2)}.badge.gray{background:#EEF1F6;color:var(--muted)}

/* photo comparison C5 */
.cmp{border:1px solid var(--line);border-radius:11px;padding:12px;margin-bottom:12px}
.cmp .ct{font-weight:600;font-size:13.5px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cmp-col .cl{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.cmp-col img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:8px;border:1px solid var(--line);cursor:pointer}
.cmp-col .no{aspect-ratio:4/3;border:1.5px dashed var(--line);border-radius:8px;display:grid;place-items:center;color:var(--muted);font-size:12px}

.empty{text-align:center;padding:30px;color:var(--muted);font-size:13.5px}
.ok-line{display:flex;align-items:center;gap:8px;color:var(--green);font-size:13.5px;font-weight:500;padding:8px 0}
.alert{padding:11px 14px;border-radius:10px;font-size:13px;font-weight:500;margin-bottom:14px}
.alert.err{background:rgba(214,40,40,.08);color:var(--red-deep);border:1px solid rgba(214,40,40,.25)}
.alert.ok{background:rgba(14,138,95,.1);color:var(--green);border:1px solid rgba(14,138,95,.25)}
.alert.info{background:rgba(30,39,97,.07);color:var(--navy-2);border:1px solid rgba(30,39,97,.18)}
.hint{font-size:12px;color:var(--muted);margin-top:5px}
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.list-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.list-row:last-child{border:none}

#gate{position:fixed;inset:0;background:var(--bg);z-index:100;display:grid;place-items:center;padding:20px}
#gate .box{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:30px;max-width:380px;width:100%}
#gate h1{font-family:"Bai Jamjuree";font-weight:700;font-size:20px;color:var(--navy);text-align:center;margin-bottom:4px}
#gate p{text-align:center;color:var(--muted);font-size:13px;margin-bottom:20px}

@media(max-width:720px){.kpis{grid-template-columns:repeat(2,1fr)}}
@media print{
  body *{visibility:hidden}.hazard,.topbar,.toolbar{display:none!important}
  .wrap{max-width:100%;padding:0}
  .report,.report *{visibility:visible}
  .report{box-shadow:none;border:none;border-radius:0}
  .sec{page-break-inside:avoid}
}
</style>
</head>
<body>
<div class="hazard"></div>

<div id="gate">
  <div class="box">
    <div style="text-align:center;margin-bottom:16px"><svg width="48" height="48" viewBox="0 0 64 64" fill="none"><path d="M32 6l22 8v16c0 14-9 23-22 28C19 53 10 44 10 30V14l22-8z" fill="#1E2761"/><path d="M22 24h20M22 31h20M22 38h13" stroke="#CADCFC" stroke-width="2.5" stroke-linecap="round"/></svg></div>
    <h1>รายงานประจำสัปดาห์</h1><p>Security &amp; Compliance · FHS</p>
    <div id="gateAlert"></div>
    <div style="margin-bottom:14px"><label>รหัสพนักงาน</label><input type="text" id="gId" class="mono" style="text-transform:uppercase;width:100%" placeholder="EMP-1001"></div>
    <div style="margin-bottom:18px"><label>รหัสผ่าน</label><input type="password" id="gPw" style="width:100%" placeholder="••••••••"></div>
    <button class="btn btn-primary" style="width:100%" id="gBtn">เข้าสู่ระบบ</button>
  </div>
</div>

<div class="topbar">
  <div class="logo"><svg viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="7" fill="#1E2761"/><path d="M10 9h12M10 14h12M10 19h8" stroke="#CADCFC" stroke-width="2" stroke-linecap="round"/><circle cx="23" cy="22" r="4" fill="#D62828"/></svg>
    <div><b>Weekly Report</b><span>SECURITY &amp; COMPLIANCE</span></div></div>
  <nav class="appsw"><a href="index.html">ตรวจ</a><a href="dashboard.html">Dashboard</a><a href="report.html" class="cur">รายงาน</a><a href="admin.html">Admin</a></nav>
  <div class="right"><span id="adminName"></span><a id="logout">ออก</a></div>
</div>

<div class="wrap">
  <div class="toolbar">
    <div><label>ช่วงเวลา</label><select id="period"><option value="0">สัปดาห์นี้</option><option value="1" selected>สัปดาห์ที่แล้ว</option><option value="2">2 สัปดาห์ก่อน</option></select></div>
    <div class="grow"></div>
    <button class="btn btn-ghost btn-sm" id="btnPrint">🖨 พิมพ์ / PDF</button>
    <button class="btn btn-green btn-sm" id="btnSend">📧 ส่งอีเมล</button>
  </div>
  <div id="sendAlert"></div>
  <div class="report" id="report"><div class="empty">กำลังโหลดข้อมูล…</div></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, doc, getDoc, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

/* ============ CONFIG ============ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBusmdWb1BuElcAgZ8IC4-bwUW0p8X0ifg", authDomain: "bevchain-fhs.firebaseapp.com", projectId: "bevchain-fhs",
  storageBucket: "bevchain-fhs.firebasestorage.app", messagingSenderId: "568964415233", appId: "1:568964415233:web:4be7220d2d14644fbce500"
};
// EmailJS — สมัครที่ emailjs.com → สร้าง service + template ที่มีตัวแปร {{to_email}} {{subject}} {{{html_content}}}
const EMAILJS = { publicKey: "jlcMr7JQb8exygtzY", serviceId: "service_x1ikhw4", templateId: "template_5jp881p" };
// ผู้รับอีเมลแยกตามไซต์ (E4) — ใส่หลายอีเมลคั่นด้วย , ; _all = ผู้บริหาร/ส่วนกลางได้รับทุกไซต์
const SITE_RECIPIENTS = {
  LLKDC: "llkdc-manager@bevchain.co.th",
  NDC:   "ndc-manager@bevchain.co.th",
  Wangnoi: "wangnoi-manager@bevchain.co.th",
  _all:  "egm@bevchain.co.th, security-head@bevchain.co.th"
};
const REPORT_BASE_URL = location.href.replace(/report\.html.*$/,'dashboard.html'); // ลิงก์ดูรายละเอียดในอีเมล
/* ================================ */

const app=initializeApp(FIREBASE_CONFIG); const db=getFirestore(app);
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); // escape quotes ด้วย เพราะใช้ใน attribute
async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');}
const tsDate=ts=>ts?(ts.toDate?ts.toDate():new Date(ts)):null;
const fmtD=d=>d?d.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit'}):'—';
const fmt=d=>d?d.toLocaleString('th-TH',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'—';
function weekRange(off=0){ const n=new Date(); const day=(n.getDay()+6)%7; const mon=new Date(n); mon.setDate(n.getDate()-day-off*7); mon.setHours(0,0,0,0); const end=new Date(mon); end.setDate(mon.getDate()+7); return {start:mon,end}; }

let STATIONS=[],INSPECTIONS=[],CASES=[],ADMIN=null;

async function gateLogin(){
  const id=$('gId').value.trim().toUpperCase(),pw=$('gPw').value,a=$('gateAlert');a.innerHTML='';
  if(!id||!pw){a.innerHTML='<div class="alert err">กรอกข้อมูลให้ครบ</div>';return;}
  const btn=$('gBtn');btn.disabled=true;btn.innerHTML='<div class="spinner"></div>';
  try{
    const snap=await getDoc(doc(db,'users',id)); if(!snap.exists())throw new Error('ไม่พบผู้ใช้');
    const u=snap.data(); if(!['admin','viewer'].includes(u.role))throw new Error('ไม่มีสิทธิ์เข้าถึง');
    if((await sha256((u.salt||'')+pw))!==u.passwordHash)throw new Error('รหัสผ่านไม่ถูกต้อง');
    ADMIN={id,name:u.name||id,role:u.role}; sessionStorage.setItem('fhs_admin',JSON.stringify(ADMIN)); boot();
  }catch(e){a.innerHTML=`<div class="alert err">${esc(e.message)}</div>`;}
  finally{btn.disabled=false;btn.textContent='เข้าสู่ระบบ';}
}
async function boot(){
  $('gate').style.display='none'; $('adminName').textContent=ADMIN.name;
  if(EMAILJS.publicKey&&!EMAILJS.publicKey.startsWith('YOUR')) emailjs.init({publicKey:EMAILJS.publicKey});
  const [st,ins,cs]=await Promise.all([getDocs(collection(db,'stations')),getDocs(collection(db,'inspections')),getDocs(collection(db,'cases'))]);
  STATIONS=st.docs.map(d=>({id:d.id,...d.data()}));
  INSPECTIONS=ins.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(tsDate(b.createdAt)?.getTime()||0)-(tsDate(a.createdAt)?.getTime()||0));
  CASES=cs.docs.map(d=>({id:d.id,...d.data()}));
  renderReport();
}

function inRange(i,r){ const d=tsDate(i.createdAt); return d&&d>=r.start&&d<r.end; }
function compute(off){
  const cur=weekRange(off), prev=weekRange(off+1);
  const ci=INSPECTIONS.filter(i=>inRange(i,cur)), pi=INSPECTIONS.filter(i=>inRange(i,prev));
  const stat=arr=>{ const pass=arr.filter(i=>i.result==='pass').length; const fail=arr.length-pass;
    const issues=arr.reduce((s,i)=>s+(i.missingItems?.length||0),0);
    const stationsDone=new Set(arr.map(i=>i.stationId)).size;
    return {count:arr.length,pass,fail,issues,stationsDone,rate:arr.length?Math.round(pass/arr.length*100):0}; };
  const c=stat(ci), p=stat(pi);
  const uninspected=STATIONS.filter(s=>!ci.some(i=>i.stationId===s.id));
  const failList=ci.filter(i=>i.result!=='pass');
  const newCases=CASES.filter(x=>{ const d=tsDate(x.reportedMissingAt); return d&&d>=cur.start&&d<cur.end; });
  // photo comparison: stations inspected in BOTH weeks
  const cmp=[];
  STATIONS.forEach(s=>{
    const a=ci.find(i=>i.stationId===s.id), b=pi.find(i=>i.stationId===s.id);
    if(a&&b&&(a.photos?.length||b.photos?.length)) cmp.push({s,now:a.photos?.[0]?.url,prev:b.photos?.[0]?.url});
  });
  return {cur,prev,c,p,uninspected,failList,newCases,cmp};
}

function delta(now,was,inv=false){
  const d=now-was; const cls=d===0?'flat':((d>0)!==inv?'up':'down');
  const arrow=d>0?'▲':d<0?'▼':'—';
  return `<div class="d ${cls}">${arrow} ${d>0?'+':''}${d} จากสัปดาห์ก่อน</div>`;
}

function renderReport(){
  const off=parseInt($('period').value);
  const R=compute(off);
  const periodTxt=`${fmtD(R.cur.start)} – ${fmtD(new Date(R.cur.end-1))}`;

  let html=`<div class="r-head">
    <div class="et">รายงานตรวจสอบสถานีหัวดับเพลิง</div>
    <div class="ep">BevChain Thailand · Security &amp; Compliance · ประจำสัปดาห์ ${periodTxt}</div>
    <div class="badge-site">ทุกไซต์ · ${STATIONS.length} สถานี</div>
  </div>`;

  // KPIs + week over week (E7)
  html+=`<div class="sec"><h3>📊 ภาพรวม (เทียบสัปดาห์ก่อน)</h3><div class="kpis">
    <div class="kpi navy"><div class="v">${R.c.count}</div><div class="l">การตรวจ</div>${delta(R.c.count,R.p.count)}</div>
    <div class="kpi ${R.c.rate>=80?'green':R.c.rate>=50?'amber':'red'}"><div class="v">${R.c.rate}%</div><div class="l">อัตราผ่าน</div>${delta(R.c.rate,R.p.rate)}</div>
    <div class="kpi ${R.c.fail?'red':'green'}"><div class="v">${R.c.fail}</div><div class="l">ไม่ผ่าน/ต้องแก้</div>${delta(R.c.fail,R.p.fail,true)}</div>
    <div class="kpi ${R.c.issues?'red':'green'}"><div class="v">${R.c.issues}</div><div class="l">อุปกรณ์หาย</div>${delta(R.c.issues,R.p.issues,true)}</div>
  </div></div>`;

  // fail table with photos (E3)
  html+=`<div class="sec"><h3>⚠️ รายการที่ไม่ผ่าน / ต้องแก้ไข</h3>`;
  if(R.failList.length){
    html+=`<table><thead><tr><th>สถานี</th><th>ไซต์</th><th>ผู้ตรวจ</th><th>วันที่</th><th>ผล</th><th>ปัญหา</th><th>รูป</th></tr></thead><tbody>`;
    R.failList.forEach(i=>{
      const probs=[]; Object.entries(i.checklist||{}).forEach(([k,v])=>{if(v.status==='fail')probs.push(k);});
      (i.missingItems||[]).forEach(m=>probs.push(m.name+'(หาย)'));
      html+=`<tr><td class="mono">${esc(i.stationId)}</td><td>${esc(i.site||'')}</td><td>${esc(i.inspectorName||'')}</td><td>${fmt(tsDate(i.createdAt))}</td>
        <td class="tag ${i.result}">${i.result==='needs_repair'?'ต้องแก้ไข':'ไม่ผ่าน'}</td>
        <td style="font-size:12px">${esc(probs.join(', ')||'-')}</td>
        <td><div class="thumbs">${(i.photos||[]).slice(0,3).map(p=>`<img class="thumb" src="${esc(p.url)}">`).join('')||'—'}</div></td></tr>`;
    });
    html+=`</tbody></table>`;
  } else html+=`<div class="ok-line">✓ ทุกสถานีที่ตรวจในสัปดาห์นี้ผ่านหมด</div>`;
  html+=`</div>`;

  // missing items / new CCTV cases
  if(R.newCases.length){
    html+=`<div class="sec"><h3>🎥 เคสของหายที่เปิดใหม่สัปดาห์นี้</h3>`;
    R.newCases.forEach(c=>{ html+=`<div class="list-row"><span class="badge red">หาย</span><b>${esc(c.itemName)}</b><span class="hint" style="margin:0">@ ${esc(c.stationId)} · ${(c.cctvCameras||[]).length} กล้องต้องตรวจ</span></div>`; });
    html+=`</div>`;
  }

  // uninspected stations (E6)
  html+=`<div class="sec"><h3>🔍 สถานีที่ยังไม่ได้ตรวจในสัปดาห์นี้</h3>`;
  if(R.uninspected.length){
    html+=`<div class="alert info" style="margin-bottom:12px">${R.uninspected.length} สถานี ยังไม่มีการตรวจในช่วงนี้ — ควรติดตาม</div>`;
    html+=R.uninspected.map(s=>`<div class="list-row"><span class="badge amber">${esc(s.site||'-')}</span><b class="mono">${esc(s.id)}</b><span class="hint" style="margin:0">${esc(s.name||'')}</span></div>`).join('');
  } else html+=`<div class="ok-line">✓ ตรวจครบทุกสถานีในสัปดาห์นี้</div>`;
  html+=`</div>`;

  // photo comparison week over week (C5)
  html+=`<div class="sec"><h3>📸 เทียบรูปกับสัปดาห์ก่อน (week-over-week)</h3>`;
  if(R.cmp.length){
    html+=R.cmp.slice(0,8).map(x=>`<div class="cmp"><div class="ct"><span class="mono">${esc(x.s.id)}</span> ${esc(x.s.name||'')}</div>
      <div class="cmp-grid">
        <div class="cmp-col"><div class="cl">สัปดาห์ก่อน · ${fmtD(R.prev.start)}</div>${x.prev?`<img src="${esc(x.prev)}">`:'<div class="no">ไม่มีรูป</div>'}</div>
        <div class="cmp-col"><div class="cl">สัปดาห์นี้ · ${fmtD(R.cur.start)}</div>${x.now?`<img src="${esc(x.now)}">`:'<div class="no">ไม่มีรูป</div>'}</div>
      </div></div>`).join('');
    html+=`<p class="hint">ใช้เทียบสภาพตู้/สาย/หัวฉีด ดูการเปลี่ยนแปลงหรือสิ่งผิดปกติระหว่างสัปดาห์</p>`;
  } else html+=`<div class="empty">ยังไม่มีสถานีที่ตรวจทั้งสองสัปดาห์เพื่อเทียบรูป</div>`;
  html+=`</div>`;

  html+=`<div class="sec" style="background:var(--surface-2);text-align:center;color:var(--muted);font-size:12px">
    สร้างโดยระบบ FHS Inspection · ${esc(ADMIN.name)} · ${new Date().toLocaleString('th-TH')}</div>`;

  $('report').innerHTML=html;
  // เปิดรูปผ่าน listener ไม่ใช่ inline onclick — กัน JS-string injection จาก URL ในฐานข้อมูล
  $('report').querySelectorAll('img.thumb,.cmp-col img').forEach(im=>im.onclick=()=>window.open(im.src,'_blank'));
}

/* ====== build email HTML per site (E4) ====== */
function buildEmailHtml(off, site){
  const R=compute(off);
  const ci=INSPECTIONS.filter(i=>inRange(i,R.cur)&&(!site||i.site===site));
  const fails=ci.filter(i=>i.result!=='pass');
  const uninsp=STATIONS.filter(s=>(!site||s.site===site)&&!ci.some(i=>i.stationId===s.id));
  const periodTxt=`${fmtD(R.cur.start)} – ${fmtD(new Date(R.cur.end-1))}`;
  const pass=ci.filter(i=>i.result==='pass').length, rate=ci.length?Math.round(pass/ci.length*100):0;
  const issues=ci.reduce((s,i)=>s+(i.missingItems?.length||0),0);
  const c='#15234A',red='#D62828',amber='#E65100',green='#0E8A5F',mut='#64708A';
  let h=`<div style="font-family:Arial,sans-serif;max-width:640px;margin:0 auto;border:1px solid #ddd;border-radius:10px;overflow:hidden">
    <div style="height:6px;background:repeating-linear-gradient(135deg,${amber} 0 12px,${c} 12px 24px)"></div>
    <div style="background:${c};color:#fff;padding:20px 22px">
      <div style="font-size:20px;font-weight:700">รายงานตรวจสอบสถานีหัวดับเพลิง</div>
      <div style="color:#CADCFC;font-size:13px;margin-top:4px">BevChain · Security &amp; Compliance · ${site||'ทุกไซต์'} · ${periodTxt}</div></div>
    <div style="padding:18px 22px">
    <table width="100%" style="border-collapse:collapse;margin-bottom:18px"><tr>
      <td style="text-align:center;padding:10px;border:1px solid #eee;border-radius:8px"><div style="font-size:24px;font-weight:700;color:${c}">${ci.length}</div><div style="font-size:11px;color:${mut}">การตรวจ</div></td>
      <td style="text-align:center;padding:10px;border:1px solid #eee"><div style="font-size:24px;font-weight:700;color:${rate>=80?green:rate>=50?amber:red}">${rate}%</div><div style="font-size:11px;color:${mut}">อัตราผ่าน</div></td>
      <td style="text-align:center;padding:10px;border:1px solid #eee"><div style="font-size:24px;font-weight:700;color:${fails.length?red:green}">${fails.length}</div><div style="font-size:11px;color:${mut}">ไม่ผ่าน</div></td>
      <td style="text-align:center;padding:10px;border:1px solid #eee"><div style="font-size:24px;font-weight:700;color:${issues?red:green}">${issues}</div><div style="font-size:11px;color:${mut}">ของหาย</div></td>
    </tr></table>`;
  if(fails.length){
    h+=`<div style="font-weight:700;color:${c};margin-bottom:8px">⚠️ รายการที่ไม่ผ่าน</div><table width="100%" style="border-collapse:collapse;font-size:13px;margin-bottom:18px">
      <tr style="background:#f4f6fa"><th align="left" style="padding:7px">สถานี</th><th align="left" style="padding:7px">ผู้ตรวจ</th><th align="left" style="padding:7px">ผล</th></tr>`;
    fails.forEach(i=>{h+=`<tr><td style="padding:7px;border-top:1px solid #eee">${esc(i.stationId)}</td><td style="padding:7px;border-top:1px solid #eee">${esc(i.inspectorName||'')}</td><td style="padding:7px;border-top:1px solid #eee;color:${red}">${i.result==='needs_repair'?'ต้องแก้ไข':'ไม่ผ่าน'}</td></tr>`;});
    h+=`</table>`;
  } else h+=`<div style="color:${green};font-weight:600;margin-bottom:18px">✓ ทุกสถานีที่ตรวจผ่านหมด</div>`;
  if(uninsp.length) h+=`<div style="background:#fff6ef;border:1px solid #f0c9a8;border-radius:8px;padding:12px;margin-bottom:18px"><b style="color:${amber}">ยังไม่ได้ตรวจ ${uninsp.length} สถานี:</b> ${uninsp.map(s=>esc(s.id)).join(', ')}</div>`;
  h+=`<div style="text-align:center;margin:8px 0"><a href="${REPORT_BASE_URL}" style="background:${c};color:#fff;text-decoration:none;padding:11px 22px;border-radius:8px;font-weight:600;display:inline-block">ดูรายละเอียดทั้งหมด →</a></div>
    </div><div style="background:#f4f6fa;padding:12px;text-align:center;color:${mut};font-size:11px">ระบบ FHS Inspection · อีเมลอัตโนมัติ ห้ามตอบกลับ</div></div>`;
  return {html:h,subject:`[FHS] รายงานสัปดาห์ ${site||'ทุกไซต์'} · ${periodTxt} · ไม่ผ่าน ${fails.length}`};
}

async function sendEmail(){
  const a=$('sendAlert'); a.innerHTML='';
  if(!EMAILJS.serviceId||EMAILJS.serviceId.startsWith('YOUR')){ a.innerHTML='<div class="alert err">ยังไม่ได้ตั้งค่า EmailJS (publicKey/serviceId/templateId) ที่หัวไฟล์ report.html</div>'; return; }
  const off=parseInt($('period').value);
  // recipients: each site that has data + _all
  const sitesWithData=[...new Set(INSPECTIONS.filter(i=>inRange(i,weekRange(off))).map(i=>i.site).filter(Boolean))];
  const jobs=[];
  sitesWithData.forEach(site=>{ if(SITE_RECIPIENTS[site]) jobs.push({to:SITE_RECIPIENTS[site],site}); });
  if(SITE_RECIPIENTS._all) jobs.push({to:SITE_RECIPIENTS._all,site:null});
  if(!jobs.length){ a.innerHTML='<div class="alert err">ไม่มีผู้รับที่ตั้งค่าไว้ใน SITE_RECIPIENTS</div>'; return; }
  const btn=$('btnSend'); btn.disabled=true; btn.innerHTML='<div class="spinner"></div>ส่ง…';
  let ok=0,err=0;
  for(const j of jobs){
    const {html,subject}=buildEmailHtml(off,j.site);
    // split comma/semicolon-separated addresses so each send() gets one valid email
    const addrs=j.to.split(/[,;]/).map(s=>s.trim()).filter(Boolean);
    for(const addr of addrs){
      try{ await emailjs.send(EMAILJS.serviceId,EMAILJS.templateId,{to_email:addr,subject,html_content:html}); ok++; }
      catch(e){ err++; console.error(e); }
    }
  }
  btn.disabled=false; btn.textContent='📧 ส่งอีเมล';
  a.innerHTML=`<div class="alert ${err?'err':'ok'}">ส่งสำเร็จ ${ok} ฉบับ${err?` · ล้มเหลว ${err} (ดู console)`:''}</div>`;
}

$('period').onchange=renderReport;
$('btnPrint').onclick=()=>window.print();
$('btnSend').onclick=sendEmail;
$('gBtn').onclick=gateLogin;
$('gPw').addEventListener('keydown',e=>{if(e.key==='Enter')gateLogin();});
$('logout').onclick=()=>{sessionStorage.removeItem('fhs_admin');location.reload();};
(function(){ let s=null; try{ s=JSON.parse(sessionStorage.getItem('fhs_admin')); }catch(e){} if(s){ ADMIN=s; boot(); } })();
</script>
